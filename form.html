<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>POST API</title>

  <!-- Bootstrap 5.3 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-4">

        <h3 class="text-center mb-4">Enviar Equipamento</h3>

        <form id="equipamentoForm">

          <div class="mb-3">
            <input class="form-control" id="nome_equipamento" placeholder="Nome equipamento" required>
          </div>

          <div class="mb-3">
            <input class="form-control" id="nome_display" placeholder="Nome display" required>
          </div>

          <div class="mb-3">
            <input class="form-control" id="idsectra" placeholder="Idsectra" required>
          </div>

          <button class="btn btn-success w-100" type="submit">
            Enviar
          </button>

        </form>

      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Seu JS -->
  <script src="post.js"></script>

</body>
</html>
